name: opendesk-keycloak

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: opendesk_keycloak_db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_keycloak_password
    secrets:
      - postgres_keycloak_password
    volumes:
      - ${DATA_DIR}/keycloak/db:/var/lib/postgresql/data
    networks:
      - opendesk_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 15s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: opendesk_keycloak
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        export KC_DB_PASSWORD=$$(cat /run/secrets/postgres_keycloak_password)
        export KC_BOOTSTRAP_ADMIN_PASSWORD=$$(cat /run/secrets/keycloak_admin_password)
        exec /opt/keycloak/bin/kc.sh start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    secrets:
      - postgres_keycloak_password
      - keycloak_admin_password
    networks:
      - opendesk_db
      - opendesk_backend
      - opendesk_frontend
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${DOMAIN_IAM}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.middlewares=default-chain@file"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

secrets:
  postgres_keycloak_password:
    file: ../../secrets/postgres_keycloak_password
  keycloak_admin_password:
    file: ../../secrets/keycloak_admin_password

networks:
  opendesk_frontend:
    external: true
  opendesk_backend:
    external: true
  opendesk_db:
    external: true
