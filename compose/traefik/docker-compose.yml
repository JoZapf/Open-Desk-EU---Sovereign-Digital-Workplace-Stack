services:
  traefik:
    image: traefik:v3.6
    container_name: opendesk_traefik
    restart: unless-stopped
    # Adjust GID to match your docker group (id -g docker or getent group docker)
    user: "1000:984"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    ports:
      # Bind to HOST_IP for LAN access during testing.
      # Change to 127.0.0.1 in production (traffic via upstream nginx).
      - "127.0.0.1:${TRAEFIK_PORT}:8443"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ${DATA_DIR}/logs/traefik:/var/log/traefik
    tmpfs:
      - /tmp
    networks:
      - opendesk_frontend
      - opendesk_backend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=false"

networks:
  opendesk_frontend:
    external: true
  opendesk_backend:
    external: true
