api:
  dashboard: true
  insecure: true

ping:
  entryPoint: websecure

entryPoints:
  websecure:
    address: ":8443"
    proxyProtocol:
      trustedIPs:
        - "127.0.0.1/32"
        - "172.31.0.0/16"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: opendesk_frontend
  file:
    directory: "/etc/traefik/dynamic"
    watch: true

log:
  level: INFO
  filePath: "/var/log/traefik/traefik.log"

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
