server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://opendesk_loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: name
            values:
              - "opendesk_.*"
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(opendesk_.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_name']
        regex: '/?(opendesk_.*)'
        target_label: job
        replacement: '$1'
